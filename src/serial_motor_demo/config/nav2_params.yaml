amcl:
  ros__parameters:
    use_sim_time: False
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"

bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_frame: base_link
    odom_frame: odom

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 5.0 # 🎯 Pi için 20Hz'den 5Hz'e düşürüldü (İşlemci rahat nefes alsın)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.2 # Robot odada yavaş ve güvenli gitsin (Max 20 cm/s)
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: False
      regulated_linear_velocity_scaling_factor: 1.0
      use_cost_regulated_linear_velocity_scaling: True

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 2.0 # 🎯 Pi dostu düşük güncelleme
      publish_frequency: 2.0
      global_frame: odom
      robot_frame: base_link
      use_sim_time: False
      rolling_window: true
      track_unknown_space: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[ [0.13, 0.10], [0.13, -0.10], [-0.13, -0.10], [-0.13, 0.10] ]"
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.15 # Duvarlara 35 cm'den fazla yaklaşmasın emri
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_frame: base_link
      use_sim_time: False
      track_unknown_space: true
      footprint: "[ [0.13, 0.10], [0.13, -0.10], [-0.13, -0.10], [-0.13, 0.10] ]"
      resolution: 0.05
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        scan:
          topic: /scan
          data_type: "LaserScan"
          marking: True
          clearing: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.15
        cost_scaling_factor: 3.0

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: False
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      use_astar: True
      allow_unknown: True

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries::Spin"
    backup:
      plugin: "nav2_recoveries::Backup"
    wait:
      plugin: "nav2_recoveries::Wait"
